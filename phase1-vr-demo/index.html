<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XR Navigation Demo - A-Frame VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- A-Frame VR Scene -->
    <a-scene teleport-on-click>
        <!-- Lighting -->
        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="5 10 5"></a-light>

        <!-- Environment -->
        <a-sky color="#87CEEB"></a-sky>
        <a-plane color="#90EE90" rotation="-90 0 0" width="20" height="20" position="0 0 0"></a-plane>

        <!-- Walls -->
        <a-box color="#D3D3D3" width="20" height="4" depth="0.2" position="0 2 -10"></a-box>
        <a-box color="#D3D3D3" width="20" height="4" depth="0.2" position="0 2 10"></a-box>
        <a-box color="#D3D3D3" width="0.2" height="4" depth="20" position="-10 2 0"></a-box>
        <a-box color="#D3D3D3" width="0.2" height="4" depth="20" position="10 2 0"></a-box>

        <!-- Teleport Zone 1: Workspace -->
        <a-cylinder
            class="teleport-marker"
            color="#FF6B6B"
            radius="0.8"
            height="0.1"
            position="0 0.05 -5"
            data-destination="0 1.6 -5"
            data-label="Workspace">
        </a-cylinder>
        <a-cylinder color="#FF6B6B" radius="0.3" height="2" position="0 1.1 -5" opacity="0.7"></a-cylinder>
        <a-text value="Workspace" align="center" position="0 2.5 -5" scale="2 2 2" color="#FF6B6B"></a-text>

        <!-- Teleport Zone 2: Meeting Room -->
        <a-cylinder
            class="teleport-marker"
            color="#4ECDC4"
            radius="0.8"
            height="0.1"
            position="5 0.05 0"
            data-destination="5 1.6 0"
            data-label="Meeting Room">
        </a-cylinder>
        <a-cylinder color="#4ECDC4" radius="0.3" height="2" position="5 1.1 0" opacity="0.7"></a-cylinder>
        <a-text value="Meeting Room" align="center" position="5 2.5 0" scale="2 2 2" color="#4ECDC4"></a-text>

        <!-- Teleport Zone 3: Info Hub -->
        <a-cylinder
            class="teleport-marker"
            color="#95E1D3"
            radius="0.8"
            height="0.1"
            position="-5 0.05 0"
            data-destination="-5 1.6 0"
            data-label="Info Hub">
        </a-cylinder>
        <a-cylinder color="#95E1D3" radius="0.3" height="2" position="-5 1.1 0" opacity="0.7"></a-cylinder>
        <a-text value="Info Hub" align="center" position="-5 2.5 0" scale="2 2 2" color="#95E1D3"></a-text>

        <!-- Camera with Gaze Cursor -->
        <a-camera position="0 1.6 0" look-controls wasd-controls>
            <a-cursor
                color="#FFFFFF"
                scale="1 1 1"
                fuse="true"
                fuse-timeout="2000"
                animation="property: scale; startEvents: mouseenter; from: 0.8 0.8 0.8; to: 1.2 1.2 1.2; dur: 500; easing: easeInQuad"
                animation__click="property: scale; startEvents: click; from: 1 1 1; to: 0.8 0.8 0.8; dur: 200">
            </a-cursor>
        </a-camera>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
