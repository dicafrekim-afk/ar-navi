<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a3a"/>
      <stop offset="100%" stop-color="#000e24"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 외곽 링 -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#007FFF" stroke-width="6" opacity="0.25"/>

  <!-- 나침반 눈금 (N/S/E/W) -->
  <circle cx="256" cy="72"  r="8" fill="#007FFF" opacity="0.5"/>
  <circle cx="256" cy="440" r="6" fill="#007FFF" opacity="0.3"/>
  <circle cx="72"  cy="256" r="6" fill="#007FFF" opacity="0.3"/>
  <circle cx="440" cy="256" r="6" fill="#007FFF" opacity="0.3"/>

  <!-- 내비게이션 화살표 -->
  <polygon
    points="256,108 316,376 256,336 196,376"
    fill="#007FFF"
    filter="url(#glow)"
  />

  <!-- AR 격자 (하단 장식) -->
  <line x1="180" y1="430" x2="256" y2="380" stroke="#007FFF" stroke-width="2.5" opacity="0.4"/>
  <line x1="332" y1="430" x2="256" y2="380" stroke="#007FFF" stroke-width="2.5" opacity="0.4"/>
  <line x1="148" y1="460" x2="256" y2="395" stroke="#007FFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="364" y1="460" x2="256" y2="395" stroke="#007FFF" stroke-width="1.5" opacity="0.2"/>
</svg>
